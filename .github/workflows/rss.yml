name: RSS Workflow

on:
  push:
    paths:
      - 'rss.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fast-channels:
    name: Fast Channels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Measure fast channels
        run: |
          echo "Channel,Time" > rss_times.csv
          # Быстрые каналы: limit остаётся прежним
          channels=(
            "nplusone|20"
            "dtfbest|20"
            "biggeekru|20"
            "rozetked|20"
            "disgustingmen|20"
            "solek_yt|20"
            "Nothing_Russia|20"
            "cooleach_timetravel|30"
            "simbul1648|30"
            "zombaktales|30"
            "obschimplanom|30"
            "firmamelodiya|30"
            "bladerunnerblues|30"
            "amoledwatchfaces|30"
            "old_Moscow|30"
            "togdazine|30"
            "oldkazan|30"
            "eydetat|30"
            "artgallery|30"
            "nazad90|30"
            "luchofficial|30"
          )
          for ch in "${channels[@]}"; do
            IFS="|" read -r name limit <<< "$ch"
            start=$(date +%s.%N)
            curl -s -m $((limit + 10)) "https://rsshub.rssforever.com/telegram/channel/$name?limit=$limit" > /dev/null
            end=$(date +%s.%N)
            elapsed=$(echo "$end - $start" | bc)
            echo "${name},${elapsed}" >> rss_times.csv
          done

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: rss_times
          path: rss_times.csv

  heavy-channels:
    name: Heavy Channels
    runs-on: ubuntu-latest
    needs: fast-channels
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Measure heavy channels
        run: |
          echo "Channel,Time" > rss_times_heavy.csv
          # Тяжёлые каналы: уменьшенный limit=10
          channels=(
            "novosti_efir|10"
            "tass_agency|10"
            "ulpressa|15"
            "russicaRU|10"
            "ejdailyru|15"
            "banksta|15"
            "rusbri|15"
            "brieflyru|10"
            "emet73|10"
            "uet73|10"
          )
          for ch in "${channels[@]}"; do
            IFS="|" read -r name limit <<< "$ch"
            start=$(date +%s.%N)
            curl -s -m $((limit + 10)) "https://rsshub.rssforever.com/telegram/channel/$name?limit=$limit" > /dev/null
            end=$(date +%s.%N)
            elapsed=$(echo "$end - $start" | bc)
            echo "${name},${elapsed}" >> rss_times_heavy.csv
          done

      - name: Upload heavy CSV
        uses: actions/upload-artifact@v4
        with:
          name: rss_times_heavy
          path: rss_times_heavy.csv
