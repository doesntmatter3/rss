name: RSS Workflow

on:
  push:
    paths:
      - 'rss.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq bc

      - name: Run OPML generator
        run: |
          chmod +x generate_opml.sh
          ./generate_opml.sh

      - name: Commit and push OPML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add rss.opml
          git commit -m "Update rss.opml" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/doesntmatter3/rss.git
